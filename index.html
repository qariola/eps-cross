<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPS-CROSS Analyzer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; }
  .header { padding: 24px 32px 16px; border-bottom: 1px solid #21262d; }
  .header h1 { font-size: 20px; font-weight: 600; color: #58a6ff; letter-spacing: 0.5px; }
  .header p { font-size: 12px; color: #8b949e; margin-top: 4px; }
  .search-bar { display: flex; gap: 10px; padding: 20px 32px; border-bottom: 1px solid #21262d; align-items: center; }
  .search-bar input { flex: 1; max-width: 300px; padding: 10px 14px; background: #161b22; border: 1px solid #30363d; border-radius: 6px; color: #e6edf3; font-size: 14px; outline: none; text-transform: uppercase; }
  .search-bar input:focus { border-color: #58a6ff; }
  .search-bar button { padding: 10px 20px; background: #238636; border: none; border-radius: 6px; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; }
  .search-bar button:hover { background: #2ea043; }
  .search-bar button:disabled { background: #21262d; color: #8b949e; cursor: not-allowed; }
  .status { padding: 12px 32px; font-size: 13px; color: #8b949e; min-height: 40px; }
  .status.error { color: #f85149; }
  .status.ok { color: #3fb950; }
  .cards { display: flex; gap: 16px; padding: 0 32px 20px; flex-wrap: wrap; }
  .card { background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 16px 20px; min-width: 130px; }
  .card label { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 6px; }
  .card value { font-size: 22px; font-weight: 700; color: #e6edf3; display: block; }
  .card.signal-buy value { color: #3fb950; }
  .card.signal-sell value { color: #f85149; }
  .card.signal-none value { color: #8b949e; }
  .chart-wrap { padding: 0 32px 20px; }
  .chart-box { background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
  .chart-box h3 { font-size: 13px; color: #8b949e; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.5px; }
  .chart-box canvas { max-height: 340px; }
  .signal-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .signal-table th { text-align: left; padding: 8px 12px; border-bottom: 1px solid #21262d; color: #8b949e; font-weight: 500; font-size: 11px; text-transform: uppercase; }
  .signal-table td { padding: 8px 12px; border-bottom: 1px solid #0d1117; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .badge.buy { background: rgba(63,185,80,0.15); color: #3fb950; }
  .badge.sell { background: rgba(248,81,73,0.15); color: #f85149; }
  .insight { background: #161b22; border: 1px solid #21262d; border-left: 3px solid #58a6ff; border-radius: 8px; padding: 16px 20px; margin: 0 32px 24px; font-size: 13px; line-height: 1.7; color: #c9d1d9; }
  .insight h3 { color: #58a6ff; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .hidden { display: none; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <h1>EPS-CROSS Analyzer</h1>
  <p>Price follows earnings like a magnet — crossovers show which direction it's pulling</p>
</div>

<div class="search-bar">
  <input type="text" id="tickerInput" placeholder="Enter ticker (e.g. ELMD)" maxlength="10" />
  <button id="runBtn" onclick="runAnalysis()">Analyze</button>
</div>

<div class="status" id="status">Enter a ticker and click Analyze.</div>

<div id="cards" class="cards hidden"></div>

<div class="chart-wrap">
  <div id="priceChartBox" class="chart-box hidden">
    <h3 id="priceChartTitle">Price + EPS Overlay</h3>
    <canvas id="priceChart"></canvas>
  </div>
  <div id="epsChartBox" class="chart-box hidden">
    <h3>EPS Detail — Annual with Rolling Averages</h3>
    <canvas id="epsChart"></canvas>
  </div>
  <div id="signalBox" class="chart-box hidden">
    <h3>Signal History</h3>
    <table class="signal-table">
      <thead><tr><th>Year</th><th>Type</th><th>Signal</th><th>EPS</th><th>Avg Cross</th></tr></thead>
      <tbody id="signalBody"></tbody>
    </table>
  </div>
</div>

<div id="insight" class="insight hidden"></div>

<script>
const FMP_KEY = '6Z8TnzGxR43tO9I0GpZfFB7uI6pACyqd';
let priceChartInst = null;
let epsChartInst = null;

function setStatus(msg, type='', spinner=false) {
  const el = document.getElementById('status');
  el.innerHTML = (spinner ? '<span class="spinner"></span>' : '') + msg;
  el.className = 'status ' + type;
}

function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }

document.getElementById('tickerInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') runAnalysis();
});

async function fetchFMP(path) {
  const sep = path.includes('?') ? '&' : '?';
  const url = `https://financialmodelingprep.com${path}${sep}apikey=${FMP_KEY}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`FMP ${res.status} on ${path}`);
  const data = await res.json();
  if (data && data.error) throw new Error(data.error);
  return data;
}

async function fetchYahooPrice(ticker) {
  // Yahoo Finance chart endpoint — works from browser on https origins
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1mo&range=20y`;
  try {
    const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
    if (!res.ok) throw new Error(`Yahoo ${res.status}`);
    const data = await res.json();
    const result = data?.chart?.result?.[0];
    if (!result) throw new Error('No Yahoo data');
    const timestamps = result.timestamps || result.timestamp;
    const closes = result.indicators?.adjclose?.[0]?.adjclose || result.indicators?.quote?.[0]?.close;
    if (!timestamps || !closes) throw new Error('No Yahoo price data');
    // Build year -> price map (use last close of each year)
    const priceMap = {};
    timestamps.forEach((ts, i) => {
      if (closes[i] == null) return;
      const year = new Date(ts * 1000).getFullYear().toString();
      priceMap[year] = closes[i]; // overwrites, so last month of year wins
    });
    return priceMap;
  } catch(e) {
    // Try v8 query2
    try {
      const url2 = `https://query2.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1mo&range=20y&corsDomain=finance.yahoo.com`;
      const res2 = await fetch(url2);
      if (!res2.ok) throw new Error(`Yahoo2 ${res2.status}`);
      const data2 = await res2.json();
      const result2 = data2?.chart?.result?.[0];
      if (!result2) throw new Error('No Yahoo2 data');
      const timestamps2 = result2.timestamps || result2.timestamp;
      const closes2 = result2.indicators?.adjclose?.[0]?.adjclose || result2.indicators?.quote?.[0]?.close;
      const priceMap2 = {};
      timestamps2.forEach((ts, i) => {
        if (closes2[i] == null) return;
        const year = new Date(ts * 1000).getFullYear().toString();
        priceMap2[year] = closes2[i];
      });
      return priceMap2;
    } catch(e2) {
      return null; // price unavailable, chart without it
    }
  }
}

async function runAnalysis() {
  const ticker = document.getElementById('tickerInput').value.trim().toUpperCase();
  if (!ticker) return;

  document.getElementById('runBtn').disabled = true;
  ['cards','priceChartBox','epsChartBox','signalBox','insight'].forEach(hide);
  if (priceChartInst) { priceChartInst.destroy(); priceChartInst = null; }
  if (epsChartInst) { epsChartInst.destroy(); epsChartInst = null; }

  setStatus(`Fetching EPS data for ${ticker}…`, '', true);

  try {
    // FMP for EPS + profile
    const [incomeRaw, profileRaw] = await Promise.all([
      fetchFMP(`/api/v3/income-statement/${ticker}?limit=20&period=annual`),
      fetchFMP(`/api/v3/profile/${ticker}`)
    ]);

    if (!incomeRaw || incomeRaw.length === 0) throw new Error(`No income data for ${ticker}. Check the ticker symbol.`);

    // Parse EPS oldest first
    const epsRows = incomeRaw
      .filter(r => r.eps !== null && r.eps !== undefined)
      .map(r => ({ year: parseInt(r.date.substring(0,4)), date: r.date, eps: parseFloat(r.eps) }))
      .sort((a,b) => a.year - b.year);

    if (epsRows.length < 3) throw new Error('Not enough EPS history (need 3+ years).');

    // Rolling averages
    epsRows.forEach((r, i) => {
      r.avg3 = i >= 2 ? (epsRows[i].eps + epsRows[i-1].eps + epsRows[i-2].eps) / 3 : null;
      r.avg5 = i >= 4 ? (epsRows[i].eps + epsRows[i-1].eps + epsRows[i-2].eps + epsRows[i-3].eps + epsRows[i-4].eps) / 5 : null;
    });

    // Signals
    const signals = [];
    for (let i = 1; i < epsRows.length; i++) {
      const cur = epsRows[i], prev = epsRows[i-1];
      if (cur.avg3 !== null && prev.avg3 !== null) {
        if (prev.eps <= prev.avg3 && cur.eps > cur.avg3)
          signals.push({ year: cur.year, type: '1v3', signal: 'BUY', eps: cur.eps, cross: cur.avg3 });
        else if (prev.eps >= prev.avg3 && cur.eps < cur.avg3)
          signals.push({ year: cur.year, type: '1v3', signal: 'SELL', eps: cur.eps, cross: cur.avg3 });
      }
      if (cur.avg5 !== null && prev.avg5 !== null) {
        if (prev.avg3 <= prev.avg5 && cur.avg3 > cur.avg5)
          signals.push({ year: cur.year, type: '3v5', signal: 'BUY', eps: cur.eps, cross: cur.avg5 });
        else if (prev.avg3 >= prev.avg5 && cur.avg3 < cur.avg5)
          signals.push({ year: cur.year, type: '3v5', signal: 'SELL', eps: cur.eps, cross: cur.avg5 });
      }
    }

    // Current signal state
    const latest = epsRows[epsRows.length - 1];
    const sig1v3 = latest.avg3 !== null ? (latest.eps > latest.avg3 ? 'BUY' : 'SELL') : 'N/A';
    const sig3v5 = latest.avg5 !== null ? (latest.avg3 > latest.avg5 ? 'BUY' : 'SELL') : 'N/A';
    const combined = sig1v3 === 'BUY' && sig3v5 === 'BUY' ? 'COMBINED BUY' :
                     sig1v3 === 'SELL' && sig3v5 === 'SELL' ? 'COMBINED SELL' : 'SPLIT';

    const profile = profileRaw?.[0] || {};
    const price = profile.price || null;
    const pe = profile.pe || null;
    const companyName = profile.companyName || ticker;

    setStatus(`EPS loaded. Fetching price history…`, '', true);

    // Yahoo for price
    const priceMap = await fetchYahooPrice(ticker);

    // Cards
    const cardData = [
      { label: 'Company', val: companyName.length > 18 ? companyName.substring(0,16)+'…' : companyName, cls: '' },
      { label: 'Price', val: price ? `$${price.toFixed(2)}` : 'N/A', cls: '' },
      { label: 'Latest EPS', val: `$${latest.eps.toFixed(2)}`, cls: '' },
      { label: '3yr Avg', val: latest.avg3 ? `$${latest.avg3.toFixed(2)}` : 'N/A', cls: '' },
      { label: '5yr Avg', val: latest.avg5 ? `$${latest.avg5.toFixed(2)}` : 'N/A', cls: '' },
      { label: '1v3 Signal', val: sig1v3, cls: sig1v3 === 'BUY' ? 'signal-buy' : 'signal-sell' },
      { label: '3v5 Signal', val: sig3v5, cls: sig3v5 === 'BUY' ? 'signal-buy' : sig3v5 === 'SELL' ? 'signal-sell' : 'signal-none' },
      { label: 'Combined', val: combined, cls: combined === 'COMBINED BUY' ? 'signal-buy' : combined === 'COMBINED SELL' ? 'signal-sell' : 'signal-none' },
    ];
    const cardsEl = document.getElementById('cards');
    cardsEl.innerHTML = cardData.map(c => `
      <div class="card ${c.cls}">
        <label>${c.label}</label>
        <value>${c.val}</value>
      </div>`).join('');
    show('cards');

    // Scale factor for EPS overlay on price chart
    const scaleFactor = pe ? pe : (price && latest.eps && latest.eps > 0 ? price / latest.eps : 15);
    const epsYears = epsRows.map(r => r.year.toString());
    const priceAtYear = epsRows.map(r => priceMap ? (priceMap[r.year.toString()] || null) : null);

    // Price chart
    document.getElementById('priceChartTitle').textContent =
      `${ticker} — Price vs EPS Overlay (EPS ×${scaleFactor.toFixed(1)})`;
    show('priceChartBox');

    const buyPts = epsRows.map((r,i) => signals.find(s=>s.year===r.year&&s.signal==='BUY') ? (priceAtYear[i]||r.eps*scaleFactor) : null);
    const sellPts = epsRows.map((r,i) => signals.find(s=>s.year===r.year&&s.signal==='SELL') ? (priceAtYear[i]||r.eps*scaleFactor) : null);

    priceChartInst = new Chart(document.getElementById('priceChart').getContext('2d'), {
      type: 'line',
      data: {
        labels: epsYears,
        datasets: [
          { label: 'Price', data: priceAtYear, borderColor: '#58a6ff', backgroundColor: 'rgba(88,166,255,0.07)', borderWidth: 2, fill: true, pointRadius: 2, tension: 0.2 },
          { label: `EPS ×${scaleFactor.toFixed(0)}`, data: epsRows.map(r=>r.eps*scaleFactor), borderColor: '#3fb950', borderWidth: 2, borderDash:[6,3], pointRadius:0, fill:false, tension:0 },
          { label: '3yr ×scale', data: epsRows.map(r=>r.avg3!==null?r.avg3*scaleFactor:null), borderColor:'#d29922', borderWidth:1.5, borderDash:[4,4], pointRadius:0, fill:false, tension:0 },
          { label: '5yr ×scale', data: epsRows.map(r=>r.avg5!==null?r.avg5*scaleFactor:null), borderColor:'#f85149', borderWidth:1.5, borderDash:[2,4], pointRadius:0, fill:false, tension:0 },
          { label: 'BUY', data: buyPts, borderColor:'transparent', backgroundColor:'#3fb950', pointRadius:9, pointStyle:'triangle', showLine:false },
          { label: 'SELL', data: sellPts, borderColor:'transparent', backgroundColor:'#f85149', pointRadius:9, pointStyle:'triangle', rotation:180, showLine:false },
        ]
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins: { legend:{labels:{color:'#8b949e',font:{size:11},boxWidth:16}}, tooltip:{backgroundColor:'#1c2128',borderColor:'#30363d',borderWidth:1,titleColor:'#e6edf3',bodyColor:'#8b949e'} },
        scales: {
          x:{ticks:{color:'#8b949e',font:{size:10}},grid:{color:'#21262d'}},
          y:{ticks:{color:'#8b949e',font:{size:10},callback:v=>'$'+v?.toFixed(0)},grid:{color:'#21262d'}}
        }
      }
    });

    // EPS detail chart
    show('epsChartBox');
    epsChartInst = new Chart(document.getElementById('epsChart').getContext('2d'), {
      type: 'line',
      data: {
        labels: epsYears,
        datasets: [
          { label: 'Annual EPS', data: epsRows.map(r=>r.eps), borderColor:'#3fb950', backgroundColor:'rgba(63,185,80,0.08)', borderWidth:2, fill:true, pointRadius:4, tension:0.2 },
          { label: '3yr Avg', data: epsRows.map(r=>r.avg3), borderColor:'#d29922', borderWidth:2, borderDash:[6,3], pointRadius:0, fill:false, tension:0 },
          { label: '5yr Avg', data: epsRows.map(r=>r.avg5), borderColor:'#f85149', borderWidth:1.5, borderDash:[3,3], pointRadius:0, fill:false, tension:0 },
        ]
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins: { legend:{labels:{color:'#8b949e',font:{size:11},boxWidth:16}}, tooltip:{backgroundColor:'#1c2128',borderColor:'#30363d',borderWidth:1,titleColor:'#e6edf3',bodyColor:'#8b949e',callbacks:{label:ctx=>` $${ctx.parsed.y?.toFixed(2)}`}} },
        scales: {
          x:{ticks:{color:'#8b949e',font:{size:10}},grid:{color:'#21262d'}},
          y:{ticks:{color:'#8b949e',font:{size:10},callback:v=>'$'+v?.toFixed(2)},grid:{color:'#21262d'}}
        }
      }
    });

    // Signal table
    const tbody = document.getElementById('signalBody');
    tbody.innerHTML = signals.length === 0
      ? '<tr><td colspan="5" style="color:#8b949e;padding:12px">No crossover signals detected.</td></tr>'
      : [...signals].reverse().map(s => `
          <tr>
            <td>${s.year}</td>
            <td style="color:#8b949e">${s.type}</td>
            <td><span class="badge ${s.signal.toLowerCase()}">${s.signal}</span></td>
            <td>$${s.eps.toFixed(2)}</td>
            <td>$${s.cross.toFixed(2)}</td>
          </tr>`).join('');
    show('signalBox');

    // Insight
    const last3 = epsRows.slice(-3);
    const trend = last3.every((r,i,a) => i===0||r.eps>=a[i-1].eps) ? 'rising staircase ✅' :
                  last3.every((r,i,a) => i===0||r.eps<=a[i-1].eps) ? 'declining ⚠️' : 'mixed';
    const priceNote = priceMap ? '' : ' (Price chart unavailable — Yahoo blocked for this session.)';

    document.getElementById('insight').innerHTML = `
      <h3>EPS-CROSS Insight — ${ticker} / ${companyName}</h3>
      <p>
        Latest EPS <strong>$${latest.eps.toFixed(2)}</strong> vs 3yr avg <strong>${latest.avg3?'$'+latest.avg3.toFixed(2):'N/A'}</strong> 
        and 5yr avg <strong>${latest.avg5?'$'+latest.avg5.toFixed(2):'N/A'}</strong>. 
        Current signal: <strong>${combined}</strong>. 
        EPS trend (last 3 years): <strong>${trend}</strong>. 
        ${signals.length} total crossover signals in history.
        ${combined==='COMBINED BUY' ? ' Earnings magnet pointing UP — price has a tailwind.' :
          combined==='COMBINED SELL' ? ' Earnings magnet pointing DOWN — caution on new entries.' :
          ' Split signal — confirm with price action before acting.'}
        ${priceNote}
      </p>`;
    show('insight');

    const priceStatus = priceMap ? `${Object.keys(priceMap).length} years of price data` : 'price unavailable';
    setStatus(`✓ ${ticker} — ${epsRows.length} years EPS, ${signals.length} signals, ${priceStatus}.`, 'ok');

  } catch(err) {
    setStatus(`⚠ ${err.message}`, 'error');
    console.error(err);
  }

  document.getElementById('runBtn').disabled = false;
}
</script>
</body>
</html>
