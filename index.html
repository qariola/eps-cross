<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPS-CROSS v2.1 · Annual · SLATER-SCAN</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg:#ffffff;--bg2:#f5f5f2;--bg3:#eeede8;
    --text:#1a1a18;--text2:#5f5e5a;--border:rgba(0,0,0,0.12);
    --blue:#378add;--green:#1d9e75;--amber:#ba7517;
    --orange:#d85a30;--purple:#7a4db5;
  }
  @media(prefers-color-scheme:dark){
    :root{--bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;--text:#f0efe9;--text2:#b4b2a9;--border:rgba(255,255,255,0.1);}
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;}

  .header{background:var(--bg);border-bottom:0.5px solid var(--border);padding:1rem 1.5rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;}
  .header h1{font-size:18px;font-weight:500;letter-spacing:-0.3px;}
  .badge{font-size:11px;background:var(--bg2);border:0.5px solid var(--border);border-radius:4px;padding:2px 8px;color:var(--text2);}
  .search-row{display:flex;gap:8px;margin-left:auto;align-items:center;flex-wrap:wrap;}
  .search-row input.ticker-in{font-size:15px;font-weight:500;text-transform:uppercase;width:110px;padding:6px 12px;border:0.5px solid var(--border);border-radius:6px;background:var(--bg2);color:var(--text);outline:none;letter-spacing:1px;}
  .search-row input.ticker-in:focus{border-color:var(--blue);}
  .search-row select{font-size:13px;padding:6px 10px;border:0.5px solid var(--border);border-radius:6px;background:var(--bg2);color:var(--text);outline:none;cursor:pointer;}
  .search-row button{padding:6px 18px;border-radius:6px;border:none;background:var(--blue);color:#fff;font-size:14px;cursor:pointer;font-weight:500;}
  .search-row button:hover{opacity:0.88;}
  .search-row button:disabled{opacity:0.4;cursor:not-allowed;}

  .claude-key-row{background:var(--bg);border-bottom:0.5px solid var(--border);padding:0.5rem 1.5rem;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .claude-key-row label{font-size:12px;color:var(--text2);white-space:nowrap;}
  .claude-key-row input{font-size:12px;width:320px;padding:4px 10px;border:0.5px solid var(--border);border-radius:6px;background:var(--bg2);color:var(--text);outline:none;font-family:monospace;}
  .claude-key-row input:focus{border-color:var(--purple);}
  .claude-key-row a{font-size:11px;color:var(--blue);text-decoration:none;}
  .claude-key-row a:hover{text-decoration:underline;}

  .container{max-width:980px;margin:0 auto;padding:1.5rem;}
  .status{text-align:center;padding:3rem;color:var(--text2);font-size:15px;}
  .status.error{color:var(--orange);}
  .spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.7s linear infinite;margin-right:8px;vertical-align:middle;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .cards{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:1.25rem;}
  .card{background:var(--bg2);border-radius:8px;padding:0.75rem 1rem;min-width:120px;flex:1;}
  .card .label{font-size:11px;color:var(--text2);margin-bottom:4px;}
  .card .value{font-size:20px;font-weight:500;}
  .card .sub{font-size:11px;color:var(--text2);margin-top:2px;}

  .signal-banner{display:flex;align-items:center;gap:12px;padding:0.75rem 1rem;border-radius:8px;margin-bottom:1.25rem;font-size:14px;font-weight:500;border:0.5px solid var(--border);background:var(--bg2);}
  .signal-banner.buy{background:rgba(29,158,117,0.08);border-color:rgba(29,158,117,0.3);}
  .signal-banner.sell{background:rgba(216,90,48,0.08);border-color:rgba(216,90,48,0.3);}
  .signal-banner.caution{background:rgba(186,117,23,0.08);border-color:rgba(186,117,23,0.3);}
  .banner-icon{font-size:20px;}
  .banner-detail{font-size:12px;color:var(--text2);font-weight:400;margin-top:2px;}

  .warn-box{background:rgba(186,117,23,0.1);border:0.5px solid var(--amber);border-radius:6px;padding:0.6rem 1rem;font-size:12px;color:var(--amber);margin-bottom:1rem;}
  .info-box{background:rgba(55,138,221,0.08);border:0.5px solid rgba(55,138,221,0.3);border-radius:6px;padding:0.6rem 1rem;font-size:12px;color:var(--blue);margin-bottom:1rem;}

  .legend{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:8px;font-size:12px;color:var(--text2);}
  .legend span{display:flex;align-items:center;gap:5px;}
  .leg-line{width:22px;height:2px;display:inline-block;}
  .leg-dot{width:10px;height:10px;border-radius:50%;display:inline-block;}

  .chart-wrap{background:var(--bg);border:0.5px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:1rem;}
  .chart-title{font-size:12px;color:var(--text2);margin-bottom:0.75rem;font-weight:500;}

  .method-box{background:var(--bg2);border:0.5px solid var(--border);border-radius:8px;padding:0.75rem 1rem;font-size:11px;color:var(--text2);line-height:1.7;margin-bottom:1rem;}
  .method-box strong{color:var(--text);}

  .sig-table{width:100%;border-collapse:collapse;font-size:12px;}
  .sig-table th{text-align:left;padding:4px 8px;color:var(--text2);font-weight:500;border-bottom:0.5px solid var(--border);}
  .sig-table td{padding:5px 8px;border-bottom:0.5px solid var(--border);}
  .sig-table td.right{text-align:right;}
  .sig-table td.center{text-align:center;font-weight:600;}
  .sig-table tr:last-child td{border-bottom:none;}
  .sig-table tr.has-signal td{background:rgba(0,0,0,0.025);}
  .partial-tag{font-size:10px;background:rgba(186,117,23,0.15);color:var(--amber);border-radius:3px;padding:1px 5px;margin-left:4px;}

  .claude-wrap{background:var(--bg);border:0.5px solid var(--border);border-radius:10px;margin-bottom:1rem;overflow:hidden;}
  .claude-header{display:flex;align-items:center;justify-content:space-between;padding:0.75rem 1rem;border-bottom:0.5px solid var(--border);}
  .claude-header-left{display:flex;align-items:center;gap:8px;}
  .claude-dot{width:8px;height:8px;border-radius:50%;background:var(--purple);}
  .claude-title{font-size:12px;font-weight:500;color:var(--text2);}
  .claude-run-btn{font-size:12px;padding:4px 14px;border-radius:5px;border:0.5px solid var(--border);background:var(--bg2);color:var(--text);cursor:pointer;font-weight:500;}
  .claude-run-btn:hover{border-color:var(--purple);color:var(--purple);}
  .claude-run-btn:disabled{opacity:0.4;cursor:not-allowed;}
  .claude-body{padding:1rem;min-height:60px;font-size:13px;line-height:1.75;color:var(--text);white-space:pre-wrap;}
  .claude-body.muted{color:var(--text2);font-size:12px;}
  .claude-cursor{display:inline-block;width:2px;height:14px;background:var(--purple);animation:blink 1s step-end infinite;vertical-align:middle;margin-left:1px;}
  @keyframes blink{50%{opacity:0;}}
  .claude-question-row{display:flex;gap:8px;padding:0.75rem 1rem;border-top:0.5px solid var(--border);}
  .claude-question-row input{flex:1;font-size:13px;padding:6px 10px;border:0.5px solid var(--border);border-radius:6px;background:var(--bg2);color:var(--text);outline:none;}
  .claude-question-row input:focus{border-color:var(--purple);}
  .claude-question-row button{padding:6px 14px;border-radius:6px;border:none;background:var(--purple);color:#fff;font-size:13px;cursor:pointer;white-space:nowrap;}
  .claude-question-row button:disabled{opacity:0.4;cursor:not-allowed;}

  .footer{text-align:center;font-size:11px;color:var(--text2);margin-top:2rem;padding-bottom:2rem;}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>EPS-CROSS Analyzer <span style="font-size:13px;color:var(--text2);font-weight:400">v2.1</span></h1>
    <div class="badge">SLATER-SCAN · Annual 1v3 / 3v5 · FMP + Claude</div>
  </div>
  <div class="search-row">
    <input type="text" id="tickerInput" class="ticker-in" placeholder="TICKER" maxlength="10"/>
    <select id="priceMode">
      <option value="weekly">Weekly Price</option>
      <option value="daily">Daily Price</option>
    </select>
    <button id="runBtn" onclick="runAnalysis()">Analyze ↗</button>
  </div>
</div>

<div class="claude-key-row">
  <label>Claude API Key:</label>
  <input type="password" id="claudeKeyInput" placeholder="sk-ant-api03-…"/>
  <a href="https://console.anthropic.com/settings/keys" target="_blank">Get key ↗</a>
  <span style="font-size:11px;color:var(--text2);margin-left:6px">· Optional — enables AI interpretation panel</span>
</div>

<div class="container">
  <div id="output" class="status">Enter a ticker symbol above to run EPS-CROSS annual analysis.</div>
</div>

<div class="footer">EPS-CROSS v2.1 · FMP + Claude · SLATER-SCAN system</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
var FMP_KEY  = '6Z8TnzGxR43tO9I0GpZfFB7uI6pACyqd';
var FMP_BASE = 'https://financialmodelingprep.com/stable';
var FMP_V3   = 'https://financialmodelingprep.com/api/v3';

var priceChart  = null;
var epsChart    = null;
var lastScanData = null;

// ── PERSIST CLAUDE KEY ────────────────────────────────────────────────────────
(function(){
  var k = localStorage.getItem('eps_cross_claude_key');
  if(k) document.getElementById('claudeKeyInput').value = k;
})();
document.getElementById('claudeKeyInput').addEventListener('change', function(){
  localStorage.setItem('eps_cross_claude_key', this.value.trim());
});
document.getElementById('tickerInput').addEventListener('keydown', function(e){
  if(e.key==='Enter') runAnalysis();
  this.value = this.value.toUpperCase();
});

// ── FMP FETCH ─────────────────────────────────────────────────────────────────
async function fmpGet(url) {
  var sep = url.indexOf('?') >= 0 ? '&' : '?';
  var res;
  try {
    res = await fetch(url + sep + 'apikey=' + FMP_KEY);
  } catch(e) {
    throw new Error('Network error reaching FMP. Are you on http:// or https://?');
  }
  if(res.status === 401 || res.status === 403) throw new Error('FMP key rejected ('+res.status+'). Check the key in the source.');
  if(res.status === 404) throw new Error('Ticker not found on FMP (404).');
  if(!res.ok) throw new Error('FMP HTTP error ' + res.status);
  var data = await res.json();
  if(data && data['Error Message']) throw new Error('FMP: ' + data['Error Message']);
  return data;
}

// ── FETCH ANNUAL EPS ──────────────────────────────────────────────────────────
async function fetchAnnualEPS(ticker) {
  // Try stable first, fall back to v3
  var data, profile;
  try {
    data    = await fmpGet(FMP_BASE + '/income-statement?symbol=' + ticker + '&period=annual&limit=10');
    profile = await fmpGet(FMP_BASE + '/profile?symbol='          + ticker);
  } catch(e) {
    // stable failed — try v3
    try {
      data    = await fmpGet(FMP_V3 + '/income-statement/' + ticker + '?period=annual&limit=10');
      profile = await fmpGet(FMP_V3 + '/profile/'          + ticker);
    } catch(e2) {
      throw new Error('Could not reach FMP stable or v3: ' + e2.message);
    }
  }

  if(!Array.isArray(data) || !data.length)
    throw new Error('No income statement data for "' + ticker + '". Check the symbol.');

  var p = (Array.isArray(profile) && profile[0]) || profile || {};

  var annualRaw = data
    .filter(function(s){ return s.date && s.eps != null && !isNaN(s.eps); })
    .map(function(s)   { return { date: s.date.slice(0,10), eps: parseFloat(s.eps) }; })
    .reverse(); // oldest first

  if(!annualRaw.length) throw new Error('EPS field empty for "' + ticker + '".');

  return {
    annualRaw,
    companyName:  p.companyName || p.name || ticker,
    sector:       p.sector      || '',
    currentPrice: p.price       || 0
  };
}

// ── FETCH PRICE HISTORY ───────────────────────────────────────────────────────
async function fetchPriceData(ticker, mode) {
  var from = new Date();
  from.setFullYear(from.getFullYear() - 6);
  var fromStr = from.toISOString().slice(0,10);

  var data, hist;
  try {
    data = await fmpGet(FMP_BASE + '/historical-price-eod/full?symbol=' + ticker + '&from=' + fromStr);
    hist = Array.isArray(data) ? data : data.historical;
  } catch(e) {
    try {
      data = await fmpGet(FMP_V3 + '/historical-price-full/' + ticker + '?from=' + fromStr);
      hist = data.historical;
    } catch(e2) {
      throw new Error('Price history unavailable: ' + e2.message);
    }
  }

  if(!hist || !hist.length) throw new Error('No price history returned for "' + ticker + '".');

  var daily = hist
    .map(function(d){ return { d: d.date, c: parseFloat(d.adjClose || d.adj_close || d.close) }; })
    .filter(function(d){ return d.c && !isNaN(d.c); })
    .sort(function(a,b){ return a.d < b.d ? -1 : 1; });

  if(mode !== 'weekly') return daily;

  // Downsample to weekly (keep last bar of each ISO week)
  var weekly = [], lastWeek = null;
  daily.forEach(function(bar){
    var dt  = new Date(bar.d + 'T12:00:00Z');
    var day = dt.getUTCDay() || 7;
    var thu = new Date(dt); thu.setUTCDate(dt.getUTCDate() + 4 - day);
    var yr  = thu.getUTCFullYear();
    var wk  = Math.ceil(((thu - new Date(yr,0,1)) / 86400000 + 1) / 7);
    var key = yr * 100 + wk;
    if(key !== lastWeek){ weekly.push(bar); lastWeek = key; }
    else { weekly[weekly.length-1] = bar; }
  });
  return weekly;
}

// ── COMPUTATION ───────────────────────────────────────────────────────────────
function computeAvgs(arr){
  return arr.map(function(item,i){
    var a3 = i>=2 ? (arr[i-2].eps+arr[i-1].eps+item.eps)/3 : null;
    var a5 = i>=4 ? (arr[i-4].eps+arr[i-3].eps+arr[i-2].eps+arr[i-1].eps+item.eps)/5 : null;
    return { date:item.date, eps:item.eps, a3:a3, a5:a5 };
  });
}

function detectSignals(data){
  var p1=null, p3=null;
  return data.map(function(d){
    var s1=null, s3=null;
    if(d.a3!==null){
      var c=d.eps>d.a3?'above':'below';
      if(p1&&c!==p1) s1=c==='above'?'BUY':'SELL';
      p1=c;
    }
    if(d.a3!==null&&d.a5!==null){
      var c3=d.a3>d.a5?'above':'below';
      if(p3&&c3!==p3) s3=c3==='above'?'BUY':'SELL';
      p3=c3;
    }
    return { date:d.date, eps:d.eps, a3:d.a3, a5:d.a5, s1:s1, s3:s3 };
  });
}

function detectPartialYear(entries){
  if(entries.length<2) return null;
  var last=entries[entries.length-1], prev=entries[entries.length-2];
  return ((new Date(last.date)-new Date(prev.date))/(1000*60*60*24*30.4)) < 10 ? last.date : null;
}

function getCurrentSignalLabel(data){
  var last=data[data.length-1];
  var ev3=last.a3!==null?(last.eps>last.a3?'above':'below'):null;
  var a35=(last.a3!==null&&last.a5!==null)?(last.a3>last.a5?'above':'below'):null;
  if(!ev3) return{label:'Insufficient data',bannerCls:'caution',isBuy:null};
  if(!a35) return{label:'1v3: '+(ev3==='above'?'Bullish':'Bearish')+' (5yr avg pending)',bannerCls:ev3==='above'?'buy':'sell',isBuy:ev3==='above'};
  if(ev3==='above'&&a35==='above') return{label:'✦ Confirmed BUY — 1v3 & 3v5 both bullish', bannerCls:'buy', isBuy:true};
  if(ev3==='below'&&a35==='below') return{label:'✦ Confirmed SELL — 1v3 & 3v5 both bearish',bannerCls:'sell',isBuy:false};
  return{label:'Split — '+(ev3==='above'?'1v3 Bullish':'1v3 Bearish')+' / '+(a35==='above'?'3v5 Bullish':'3v5 Bearish'),bannerCls:'caution',isBuy:null};
}

function buildPriceChartData(priceArr, annualData, pe){
  var sorted=priceArr.slice().sort(function(a,b){return a.d<b.d?-1:1;});
  var ld=sorted.length?sorted[sorted.length-1].d:'';
  function npd(fd){for(var i=0;i<sorted.length;i++){if(sorted[i].d>=fd)return sorted[i].d;}return ld;}
  var sm={};
  annualData.forEach(function(d){var pd=npd(d.date);if(!sm[pd])sm[pd]={};if(d.s1)sm[pd].s1=d.s1;if(d.s3)sm[pd].s3=d.s3;});
  function stepped(f){var lv=null;return sorted.map(function(p){for(var i=annualData.length-1;i>=0;i--){if(annualData[i].date<=p.d&&annualData[i][f]!==null){lv=parseFloat((annualData[i][f]*pe).toFixed(2));break;}}return lv;});}
  return{
    labels: sorted.map(function(p){return p.d;}),
    prices: sorted.map(function(p){return p.c;}),
    epsLine:sorted.map(function(p){for(var i=annualData.length-1;i>=0;i--){if(annualData[i].date<=p.d)return parseFloat((annualData[i].eps*pe).toFixed(2));}return null;}),
    avg3Line:stepped('a3'), avg5Line:stepped('a5'),
    buy1: sorted.map(function(p){return sm[p.d]&&sm[p.d].s1==='BUY' ?p.c:null;}),
    sell1:sorted.map(function(p){return sm[p.d]&&sm[p.d].s1==='SELL'?p.c:null;}),
    buy3: sorted.map(function(p){return sm[p.d]&&sm[p.d].s3==='BUY' ?p.c*0.96:null;}),
    sell3:sorted.map(function(p){return sm[p.d]&&sm[p.d].s3==='SELL'?p.c*1.04:null;})
  };
}

// ── CLAUDE STREAM ─────────────────────────────────────────────────────────────
var SLATER_SYS =
  'You are the SLATER-SCAN EPS-CROSS engine. Apply Jim Slater\'s Zulu Principle: ' +
  'EPS staircasing, PEG discipline, rolling average crossovers as momentum signals. ' +
  '1v3 = annual EPS crosses 3yr rolling avg (early signal). ' +
  '3v5 = 3yr avg crosses 5yr avg (confirmation). Confirmed BUY = both bullish. ' +
  'Be blunt, data-driven, no disclaimers. Plain text, under 350 words.';

function buildSlaterMsg(sd, question){
  var lines=sd.signals.map(function(s){
    return '  '+s.date+'  EPS $'+s.eps.toFixed(3)+
      (s.a3!==null?' | 3yr $'+s.a3.toFixed(3):'')+
      (s.a5!==null?' | 5yr $'+s.a5.toFixed(3):'')+
      (s.s1?' | 1v3:'+s.s1:'')+(s.s3?' | 3v5:'+s.s3:'');
  }).join('\n');
  return 'Ticker: '+sd.ticker+' — '+sd.companyName+'\nSector: '+sd.sector+
    '\nPrice: $'+sd.currentPrice.toFixed(2)+'\nSignal: '+sd.signalLabel+
    '\n\nAnnual EPS (oldest→newest):\n'+lines+'\n\n'+
    (question||'Run standard EPS-CROSS SLATER-SCAN: assess staircase quality, explain crossover signals, flag concerns, one-line action verdict.');
}

async function runClaudeInterpret(sd, question, bodyEl, btnEl){
  var key=document.getElementById('claudeKeyInput').value.trim();
  if(!key){
    bodyEl.textContent='Paste your Claude API key in the bar above to enable AI interpretation.';
    bodyEl.className='claude-body muted';
    return;
  }
  if(btnEl) btnEl.disabled=true;
  bodyEl.className='claude-body';
  bodyEl.innerHTML='<span class="claude-cursor"></span>';
  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1024,
        stream:true,
        system:SLATER_SYS,
        messages:[{role:'user',content:buildSlaterMsg(sd,question||null)}]
      })
    });
    if(!res.ok){var e=await res.json().catch(function(){return{};});throw new Error('Claude '+res.status+': '+((e.error&&e.error.message)||'error'));}
    var reader=res.body.getReader(),decoder=new TextDecoder(),text='';
    bodyEl.innerHTML='';
    while(true){
      var chunk=await reader.read();
      if(chunk.done)break;
      var lines=decoder.decode(chunk.value,{stream:true}).split('\n');
      for(var i=0;i<lines.length;i++){
        var line=lines[i].trim();
        if(!line.startsWith('data: '))continue;
        var payload=line.slice(6);
        if(payload==='[DONE]')continue;
        try{var evt=JSON.parse(payload);if(evt.type==='content_block_delta'&&evt.delta&&evt.delta.text){text+=evt.delta.text;bodyEl.textContent=text;}}catch(e){}
      }
    }
    if(!text)bodyEl.textContent='(No response)';
  }catch(err){
    bodyEl.textContent='⚠ '+err.message;
    bodyEl.style.color='var(--orange)';
  }
  if(btnEl)btnEl.disabled=false;
}

// ── MAIN ──────────────────────────────────────────────────────────────────────
async function runAnalysis(){
  var ticker=document.getElementById('tickerInput').value.trim().toUpperCase();
  if(!ticker)return;
  var btn=document.getElementById('runBtn');
  btn.disabled=true; btn.textContent='...';
  if(priceChart){priceChart.destroy();priceChart=null;}
  if(epsChart){epsChart.destroy();epsChart=null;}
  lastScanData=null;
  localStorage.setItem('eps_cross_claude_key',document.getElementById('claudeKeyInput').value.trim());

  document.getElementById('output').innerHTML='<span class="spinner"></span> Fetching <strong>'+ticker+'</strong>…';

  try{
    var priceMode=document.getElementById('priceMode').value;
    var epsResult =await fetchAnnualEPS(ticker);
    var priceArr  =await fetchPriceData(ticker,priceMode);

    var annualRaw   =epsResult.annualRaw;
    var partialDate =detectPartialYear(annualRaw);
    var forCalc     =partialDate?annualRaw.filter(function(e){return e.date!==partialDate;}):annualRaw;
    var withAvgs    =computeAvgs(forCalc);
    var withSignals =detectSignals(withAvgs);
    var allForChart =partialDate
      ?withSignals.concat([{date:annualRaw[annualRaw.length-1].date,eps:annualRaw[annualRaw.length-1].eps,a3:null,a5:null,s1:null,s3:null,partial:true}])
      :withSignals;

    var currentPrice=epsResult.currentPrice||(priceArr.length?priceArr[priceArr.length-1].c:0);
    var latestFull  =withSignals[withSignals.length-1];
    var pe          =latestFull.eps>0?currentPrice/latestFull.eps:30;
    var sigState    =getCurrentSignalLabel(withSignals);
    var has5yr      =withSignals.some(function(d){return d.a5!==null;});
    var cd          =buildPriceChartData(priceArr,allForChart,pe);

    lastScanData={
      ticker:ticker,
      companyName:epsResult.companyName,
      sector:epsResult.sector,
      currentPrice:currentPrice,
      signalLabel:sigState.label,
      signals:withSignals
    };

    document.getElementById('output').innerHTML=buildHTML(
      ticker,epsResult.companyName,epsResult.sector,
      currentPrice,latestFull,sigState,
      withSignals,partialDate,allForChart,priceMode,has5yr
    );

    renderCharts(cd,allForChart,priceMode);

    var bodyEl=document.getElementById('claudeBody');
    var btnEl =document.getElementById('claudeRunBtn');
    if(bodyEl)runClaudeInterpret(lastScanData,null,bodyEl,btnEl);

  }catch(err){
    document.getElementById('output').innerHTML='<div class="status error">⚠ '+err.message+'</div>';
  }
  btn.disabled=false; btn.textContent='Analyze ↗';
}

// ── BUILD HTML ────────────────────────────────────────────────────────────────
function buildHTML(ticker,name,sector,price,latest,sigState,signals,partialDate,allData,priceMode,has5yr){
  var lwA3=null,lwA5=null;
  for(var i=signals.length-1;i>=0;i--){
    if(!lwA3&&signals[i].a3!==null)lwA3=signals[i];
    if(!lwA5&&signals[i].a5!==null)lwA5=signals[i];
    if(lwA3&&lwA5)break;
  }
  var bColor=sigState.isBuy===true?'var(--green)':sigState.isBuy===false?'var(--orange)':'var(--amber)';
  var bIcon =sigState.isBuy===true?'▲':sigState.isBuy===false?'▼':'◆';
  var bDetail='';
  if(lwA3)bDetail+='3yr avg $'+lwA3.a3.toFixed(3);
  if(lwA5)bDetail+=' &nbsp;·&nbsp; 5yr avg $'+lwA5.a5.toFixed(3);
  if(lwA3&&lwA5){var g=((lwA3.a3-lwA5.a5)/lwA5.a5*100).toFixed(1);bDetail+=' &nbsp;·&nbsp; '+(g>=0?'+':'')+g+'% spread';}

  var warnHtml=partialDate?'<div class="warn-box">⚠ Partial FY detected ('+partialDate+'). Excluded from signal calculations.</div>':'';
  var dataNote=!has5yr?'<div class="info-box">ℹ 5yr rolling avg requires 5 full fiscal years — 3v5 signal pending.</div>':'';
  var ml=priceMode==='daily'?'Daily':'Weekly';

  var sigRows=allData.filter(function(d){return d.s1||d.s3;}).reverse().map(function(d){
    var c1=d.s1==='BUY'?'style="color:var(--green)"':d.s1==='SELL'?'style="color:var(--orange)"':'';
    var c3=d.s3==='BUY'?'style="color:var(--green)"':d.s3==='SELL'?'style="color:var(--orange)"':'';
    return '<tr class="has-signal"><td>'+d.date+'</td><td class="right">$'+d.eps.toFixed(3)+'</td><td class="right">'+(d.a3!==null?'$'+d.a3.toFixed(3):'—')+'</td><td class="right">'+(d.a5!==null?'$'+d.a5.toFixed(3):'—')+'</td><td class="center" '+c1+'>'+(d.s1||'—')+'</td><td class="center" '+c3+'>'+(d.s3||'—')+'</td></tr>';
  }).join('');
  if(!sigRows)sigRows='<tr><td colspan="6" style="text-align:center;color:var(--text2);padding:12px">No crossover signals detected yet</td></tr>';

  var allRows=allData.slice().reverse().map(function(d){
    var c1=d.s1==='BUY'?'style="color:var(--green)"':d.s1==='SELL'?'style="color:var(--orange)"':'';
    var c3=d.s3==='BUY'?'style="color:var(--green)"':d.s3==='SELL'?'style="color:var(--orange)"':'';
    return '<tr'+(d.s1||d.s3?' class="has-signal"':'')+'>'+
      '<td>'+d.date+(d.partial?'<span class="partial-tag">partial</span>':'')+'</td>'+
      '<td class="right">$'+d.eps.toFixed(3)+'</td>'+
      '<td class="right">'+(d.a3!==null?'$'+d.a3.toFixed(3):'—')+'</td>'+
      '<td class="right">'+(d.a5!==null?'$'+d.a5.toFixed(3):'—')+'</td>'+
      '<td class="center" '+c1+'>'+(d.s1||'—')+'</td>'+
      '<td class="center" '+c3+'>'+(d.s3||'—')+'</td></tr>';
  }).join('');

  return ''+
    '<div style="margin-bottom:1rem">'+
      '<div style="font-size:20px;font-weight:500;margin-bottom:2px">'+name+
        ' <span style="font-size:14px;color:var(--text2);font-weight:400">('+ticker+')</span></div>'+
      '<div style="font-size:12px;color:var(--text2)">'+sector+'</div>'+
    '</div>'+
    '<div class="signal-banner '+sigState.bannerCls+'">'+
      '<span class="banner-icon" style="color:'+bColor+'">'+bIcon+'</span>'+
      '<div><div style="color:'+bColor+'">'+sigState.label+'</div>'+
      '<div class="banner-detail">'+bDetail+'</div></div>'+
    '</div>'+
    warnHtml+dataNote+
    '<div class="claude-wrap">'+
      '<div class="claude-header">'+
        '<div class="claude-header-left"><div class="claude-dot"></div><span class="claude-title">Claude · SLATER-SCAN interpretation</span></div>'+
        '<button class="claude-run-btn" id="claudeRunBtn" onclick="onClaudeRerun()">↺ Re-run</button>'+
      '</div>'+
      '<div class="claude-body muted" id="claudeBody">Running interpretation…</div>'+
      '<div class="claude-question-row">'+
        '<input type="text" id="claudeQuestion" placeholder="Ask a follow-up… e.g. is the staircase clean enough for a Slater buy?"/>'+
        '<button onclick="onClaudeAsk()" id="claudeAskBtn">Ask ↗</button>'+
      '</div>'+
    '</div>'+
    '<div class="cards">'+
      '<div class="card"><div class="label">Price</div><div class="value">$'+price.toFixed(2)+'</div></div>'+
      '<div class="card"><div class="label">Latest Annual EPS</div><div class="value">$'+latest.eps.toFixed(3)+'</div><div class="sub">'+latest.date+'</div></div>'+
      '<div class="card"><div class="label">3yr Rolling Avg</div><div class="value">'+(lwA3?'$'+lwA3.a3.toFixed(3):'—')+'</div></div>'+
      '<div class="card"><div class="label">5yr Rolling Avg</div><div class="value">'+(lwA5?'$'+lwA5.a5.toFixed(3):'—')+'</div></div>'+
      '<div class="card"><div class="label">P/E (trailing)</div><div class="value">'+(latest.eps>0?(price/latest.eps).toFixed(1)+'×':'—')+'</div></div>'+
    '</div>'+
    '<div class="method-box"><strong>Signal logic:</strong> '+
      '<strong style="color:var(--green)">1v3</strong> — annual EPS crosses its 3yr rolling avg (fast/early). &nbsp;'+
      '<strong style="color:var(--purple)">3v5</strong> — 3yr avg crosses 5yr avg (slow/confirmation). &nbsp;'+
      '<strong>Confirmed BUY</strong> = both bullish simultaneously. EPS overlay lines are P/E-scaled.'+
    '</div>'+
    '<div class="legend">'+
      '<span><span class="leg-line" style="background:var(--blue)"></span> '+ml+' price</span>'+
      '<span><span class="leg-line" style="background:rgba(55,138,221,0.45)"></span> Annual EPS</span>'+
      '<span><span class="leg-line" style="border-top:2px solid var(--amber);background:none"></span> 3yr avg</span>'+
      '<span><span class="leg-line" style="border-top:2px dashed var(--purple);background:none"></span> 5yr avg</span>'+
      '<span><span class="leg-dot" style="background:var(--green)"></span> 1v3 BUY ▲</span>'+
      '<span><span class="leg-dot" style="background:var(--orange)"></span> 1v3 SELL ▼</span>'+
      '<span><span class="leg-dot" style="background:var(--green);border:2px solid white"></span> 3v5 BUY</span>'+
      '<span><span class="leg-dot" style="background:var(--orange);border:2px solid white"></span> 3v5 SELL</span>'+
    '</div>'+
    '<div class="chart-wrap"><div class="chart-title">'+ml+' price + annual EPS overlay (last 6 yrs)</div><div style="position:relative;height:320px"><canvas id="priceChart"></canvas></div></div>'+
    '<div class="chart-wrap"><div class="chart-title">Annual EPS with 3yr and 5yr rolling averages</div><div style="position:relative;height:220px"><canvas id="epsChart"></canvas></div></div>'+
    '<div class="chart-wrap"><div class="chart-title">Crossover signal log</div>'+
      '<table class="sig-table"><thead><tr><th>FY end</th><th style="text-align:right">EPS</th><th style="text-align:right">3yr avg</th><th style="text-align:right">5yr avg</th><th style="text-align:center">1v3</th><th style="text-align:center">3v5</th></tr></thead>'+
      '<tbody>'+sigRows+'</tbody></table></div>'+
    '<div class="chart-wrap"><div class="chart-title">Full annual history</div>'+
      '<table class="sig-table"><thead><tr><th>FY end</th><th style="text-align:right">EPS</th><th style="text-align:right">3yr avg</th><th style="text-align:right">5yr avg</th><th style="text-align:center">1v3</th><th style="text-align:center">3v5</th></tr></thead>'+
      '<tbody>'+allRows+'</tbody></table></div>';
}

function onClaudeRerun(){
  if(!lastScanData)return;
  runClaudeInterpret(lastScanData,null,document.getElementById('claudeBody'),document.getElementById('claudeRunBtn'));
}
function onClaudeAsk(){
  if(!lastScanData)return;
  var q=document.getElementById('claudeQuestion').value.trim();
  if(!q)return;
  document.getElementById('claudeQuestion').value='';
  runClaudeInterpret(lastScanData,q,document.getElementById('claudeBody'),document.getElementById('claudeAskBtn'));
}
document.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&document.activeElement&&document.activeElement.id==='claudeQuestion')onClaudeAsk();
});

// ── RENDER CHARTS ─────────────────────────────────────────────────────────────
function renderCharts(cd,annualData,priceMode){
  var pc=document.getElementById('priceChart');
  var ec=document.getElementById('epsChart');
  if(!pc||!ec)return;
  var ml=priceMode==='daily'?'Daily':'Weekly';

  priceChart=new Chart(pc,{type:'line',data:{labels:cd.labels,datasets:[
    {label:ml+' Price',        data:cd.prices,  borderColor:'#378add',borderWidth:1.5,pointRadius:0,fill:false,tension:0.2,order:1},
    {label:'Annual EPS (×PE)', data:cd.epsLine, borderColor:'rgba(55,138,221,0.35)',borderWidth:1,pointRadius:0,fill:false,stepped:true,order:4},
    {label:'3yr Avg (×PE)',    data:cd.avg3Line,borderColor:'#ba7517',borderWidth:2,pointRadius:0,fill:false,stepped:true,order:2},
    {label:'5yr Avg (×PE)',    data:cd.avg5Line,borderColor:'#7a4db5',borderDash:[6,3],borderWidth:2,pointRadius:0,fill:false,stepped:true,order:3},
    {label:'1v3 BUY', data:cd.buy1, type:'scatter',pointBackgroundColor:'#1d9e75',pointRadius:9,pointStyle:'triangle',order:0},
    {label:'1v3 SELL',data:cd.sell1,type:'scatter',pointBackgroundColor:'#d85a30',pointRadius:9,pointStyle:'triangle',rotation:180,order:0},
    {label:'3v5 BUY', data:cd.buy3, type:'scatter',pointBackgroundColor:'#1d9e75',pointRadius:7,pointStyle:'circle',pointBorderColor:'#fff',pointBorderWidth:2,order:0},
    {label:'3v5 SELL',data:cd.sell3,type:'scatter',pointBackgroundColor:'#d85a30',pointRadius:7,pointStyle:'circle',pointBorderColor:'#fff',pointBorderWidth:2,order:0},
  ]},options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,callbacks:{label:function(ctx){
      var sc=['1v3 BUY','1v3 SELL','3v5 BUY','3v5 SELL'];
      if(sc.indexOf(ctx.dataset.label)>=0&&ctx.parsed.y)return' ◆ '+ctx.dataset.label;
      if(ctx.parsed.y!=null)return' '+ctx.dataset.label+': $'+ctx.parsed.y.toFixed(2);
      return null;
    }}}},
    scales:{
      x:{ticks:{maxTicksLimit:12,maxRotation:45,font:{size:11}},grid:{display:false}},
      y:{ticks:{callback:function(v){return'$'+v.toFixed(0);},font:{size:11}},grid:{color:'rgba(128,128,128,0.07)'}}
    }
  }});

  epsChart=new Chart(ec,{type:'bar',data:{labels:annualData.map(function(d){return d.date;}),datasets:[
    {label:'Annual EPS',data:annualData.map(function(d){return d.eps;}),backgroundColor:'rgba(55,138,221,0.18)',borderColor:'rgba(55,138,221,0.45)',borderWidth:1,order:3},
    {label:'3yr Avg',   data:annualData.map(function(d){return d.a3;}), type:'line',borderColor:'#ba7517',borderWidth:2.5,pointRadius:3,fill:false,tension:0.3,order:1},
    {label:'5yr Avg',   data:annualData.map(function(d){return d.a5;}), type:'line',borderColor:'#7a4db5',borderDash:[6,3],borderWidth:2.5,pointRadius:3,fill:false,tension:0.3,order:2},
  ]},options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:true,labels:{font:{size:11},padding:12}},tooltip:{mode:'index',intersect:false,callbacks:{label:function(ctx){return ctx.parsed.y!=null?' '+ctx.dataset.label+': $'+ctx.parsed.y.toFixed(3):null;}}}},
    scales:{
      x:{ticks:{maxTicksLimit:16,maxRotation:45,font:{size:10}},grid:{display:false}},
      y:{ticks:{callback:function(v){return'$'+v.toFixed(2);},font:{size:11}},grid:{color:'rgba(128,128,128,0.07)'}}
    }
  }});
}
</script>
